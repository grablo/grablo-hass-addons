name: build-addon

# Build the Grablo add-on image for amd64 + aarch64 and push to GHCR
# (ghcr.io/grablo/{arch}-addon-grablo), tagged with the version from grablo/config.yaml.
#   - on a version tag push (v1.20.0, …) → publishes that release
#   - manual run (workflow_dispatch) → rebuilds the current config.yaml version
# Requires the matching grablo_<version>_<arch>.deb to already be on the CDN
# (the Dockerfile fetches it at build time).
#
# Each architecture is a separate single-arch image (HA substitutes {arch} in the
# add-on's `image:` and pulls the matching one). Built with Docker Buildx — the
# home-assistant/builder action was deprecated (last release 2026.02.1).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    # Each arch builds on its OWN native runner (no QEMU emulation):
    #   amd64   → ubuntu-latest     (x86_64 native)
    #   aarch64 → ubuntu-24.04-arm  (arm64 native, free for public repos)
    # Removes the slow/flaky QEMU arm64 emulation (SIGSEGV, ~80min stalls).
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base-debian:bullseye
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base-debian:bullseye
    steps:
      - uses: actions/checkout@v6

      # Native runner per arch → QEMU no longer needed.
      - uses: docker/setup-buildx-action@v4

      - name: Read versions
        id: meta
        run: |
          # image tag = add-on version (config.yaml); deb fetched = controller version (build.yaml)
          v=$(sed -nE 's/^version: *"?([^"]+)"?.*/\1/p' grablo/config.yaml)
          deb=$(sed -nE 's/^ *GRABLO_VERSION: *"?([^"]+)"?.*/\1/p' grablo/build.yaml)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "deb=$deb" >> "$GITHUB_OUTPUT"
          echo "add-on version: $v  |  controller deb: $deb"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.arch }}
        uses: docker/build-push-action@v7
        with:
          context: grablo
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            GRABLO_VERSION=${{ steps.meta.outputs.deb }}
          tags: |
            ghcr.io/grablo/${{ matrix.arch }}-addon-grablo:${{ steps.meta.outputs.version }}
            ghcr.io/grablo/${{ matrix.arch }}-addon-grablo:latest
          # io.hass.* labels mirror what home-assistant/builder produced, so the
          # Supervisor treats the prebuilt image the same way.
          labels: |
            io.hass.name=Grablo IoT Core
            io.hass.description=Grablo IoT Core add-on for Home Assistant
            io.hass.arch=${{ matrix.arch }}
            io.hass.type=addon
            io.hass.url=https://grablo.co
            io.hass.version=${{ steps.meta.outputs.version }}
          push: true
          provenance: false
