# Grablo IoT Core — Home Assistant add-on manifest
name: Grablo IoT Core
version: "1.20.0"
slug: grablo
description: >-
  Run Grablo IoT Core next to Home Assistant, with no separate device needed. Grablo is
  a web-based, no-code platform for AI IoT and automation: build logic visually with
  blocks, add AI vision and audio (object and face detection, OCR, speech-to-text and
  text-to-speech), and connect protocols like MQTT, Modbus, OPC-UA and Zigbee. As an
  add-on it connects to Home Assistant automatically, so your logic can read, control
  and expose Home Assistant entities. You build and control everything from the Grablo
  web app at app.grablo.co.
url: https://grablo.co
arch:
  - amd64
  - aarch64

# Pre-built image published by CI (see .github/workflows/build-addon.yml). The
# Supervisor substitutes {arch} (amd64/aarch64) and pulls it — no on-device build.
# The image tag tracks `version` above.
image: "ghcr.io/grablo/{arch}-addon-grablo"

# grablo runs its own process (entrypoint) as the add-on's main process.
init: false

# WebRTC P2P + outbound MQTT need the host network.
host_network: true

# Grant the Supervisor-proxied Core API + inject SUPERVISOR_TOKEN, so Grablo can
# talk to Home Assistant as an add-on WITHOUT the user creating a Long-Lived token.
# (The controller auto-detects SUPERVISOR_TOKEN and uses http://supervisor/core/…;
#  if the user configures an explicit host+LLAT, that takes priority — e.g. remote HA.)
homeassistant_api: true

# Supervisor injects PulseAudio → TTS / STT / media. (Verified working in a container.)
audio: true

# Device enumeration (USB camera V4L2 lookup, USB hot-plug).
udev: true

# USB hardware WITHOUT full_access/privileged (controller 1.20.0+ uses V4L2 for cameras):
#   USB camera (AI video) — /dev/video*, /dev/media*
#   USB serial (Modbus RTU) / Zigbee dongle — /dev/ttyUSB*, /dev/ttyACM*
usb: true
uart: true   # serial/UART devices, incl. /dev/serial/by-id

# Device identity, settings, models, keys and Zigbee pairing persist on the add-on's
# /data volume (handled by the entrypoint), so they survive updates and restarts.
# No options to configure — everything is set up in the Grablo web app.

# ── Camera (AI vision) ───────────────────────────────────────────────────────
# USB cameras work WITHOUT full_access/privileged: controller 1.20.0+ enumerates
# and captures them via V4L2 (/dev/video*), and `usb: true` + `udev: true` above
# expose the nodes. (CSI cameras need libcamera + broad access — out of scope.)
# If a specific camera isn't detected, attach its node(s) explicitly:
#   devices:
#     - /dev/video0
#     - /dev/media0
